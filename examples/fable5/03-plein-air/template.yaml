# template-03 · Plein Air
# Impressionist reskin of the deck backbone. Same chrome as templates 01/02,
# painterly imagery, soft cream palette, Playfair Display + Mulish.
# Build pipeline reads this file to drive ingest -> outline -> theme -> assemble -> image -> pdf.

id: "03"
call: template-03
name: Plein Air
family: editorial-collage
status: built            # built | draft | planned
best_for:
  - culture and arts story
  - studio or practice profile
  - manifesto
  - programme or season brochure
reference_decks:         # working implementations in this repo
  - deck-kit/templates/03-plein-air/deck.html   # 12-slide, cream + pastel palette, Playfair/Mulish

canvas:
  ratio: "16:9"
  stage: [1600, 900]     # px; all positions are absolute against this, then scaled to fit
  slides: [9, 14]        # typical range; this deck ships 12

mood:
  - airy
  - impressionist
  - low-contrast
  - elegant

palette:
  # default theme. Others ship as body.theme-* classes the user can switch live.
  default: plein-air
  themes:
    plein-air: { bg: "#F3EEE2", ink: "#3A3631", ink_2: "#6B6459", paper: "#F8F4EA",
                 red: "#B7A8D1", cyan: "#9CC0DE", yellow: "#E9D8A6", olive: "#E5A6A1", peach: "#A9BE9C" }
    # red=lavender · cyan=sky · yellow=wheat · olive=rose · peach=sage
    newsroom:  { bg: "#ECECEC", ink: "#1E1E1E", ink_2: "#565656", paper: "#F6F4EE",
                 red: "#E5443B", cyan: "#34C5CE", yellow: "#ECC94B", olive: "#C2CE86", peach: "#F0AA8B" }
    riso:      { bg: "#F2EFE6", ink: "#1A1A2E", red: "#F8487F", cyan: "#3D5AFE", yellow: "#FFC400", olive: "#26C281", peach: "#FF8A65" }
    noir:      { bg: "#E9E7E2", ink: "#161616", red: "#E5403A", cyan: "#9AA0A6", yellow: "#C9C2B0", olive: "#B8BCAE", peach: "#CDC4BB" }
    botanic:   { bg: "#EDE9DF", ink: "#2B2A26", red: "#CE5B3C", cyan: "#5FA6B5", yellow: "#E0A52E", olive: "#7E8C4F", peach: "#E5A07C" }

typography:
  source: google-fonts
  bundled: vendor/fonts/fonts.css   # localized woff2, embedded into the PDF
  # vary the pairing per deck so two Plein Air decks do not read identically
  pairings:
    playfair-mulish:                 # this deck
      heading: { family: Playfair Display, weight: 600, case: title }
      body:    { family: Mulish, weight: 400 }
      label:   { family: Mulish, weight: 600, case: upper }   # eyebrows, kickers, page numbers, footer

imagery:
  medium: painterly      # collage | duotone-photo | painterly | geometric | charts | wireframe | ephemera
  strategy: generate     # all 12 slide images generated, then baked onto --bg
  motifs:
    - meadows, gardens, water lilies, poplars
    - haystacks and wheat fields under hazy sky
    - figures painting at easels in the open air
    - a single tree across four seasons
    - overlapping translucent pastel washes
  rendering: [loose visible brushstrokes, soft-feathered edges, low contrast, no hard outlines]
  generate: { tool: gemini-imagegen, post: "magick -level 0%,88%" }   # white-point baked to --bg via multiply
  fallback: css-svg      # every image sits in a .slot with a soft-masked colour-plane placeholder

layout:
  signature:
    - airy with generous margins
    - soft-edged painterly image fields that bleed off the edges
    - overlapping translucent pastel washes
    - strong asymmetry, one idea per slide
    - serif headlines in title case over low-contrast cream
  blocks:                # the section vocabulary; pick and order per outline
    - cover
    - statement          # full-bleed opening line
    - index              # contents
    - about              # narrative + figure
    - landscape          # two-column context (The Field)
    - pillars            # 5-6 elements in a row (How We Paint)
    - services           # 3-4 cards (What We Offer)
    - team               # portrait gallery (placeholders)
    - numbers            # stats / results (placeholders)
    - roadmap            # seasonal timeline, 4-6 milestones
    - perspective        # pull quote
    - closing            # contact

effects:
  texture: [paper grain, soft film-grain overlay, blurred pastel washes]
  shadows: none

rules:
  - painterly imagery, no photographs and no clip-art
  - soft-feathered edges; let image fields dissolve into the cream ground
  - keep copy plain: no em dashes, no filler, no jargon, no theatrics
  - one idea per slide; short declarative headlines in title case
  - update the footer running title and NN/TT page numbers to match the final deck

features:                # shipped in the template, not content
  navigation: [arrows, space, home/end, on-screen buttons, "#n hash"]
  palette_switcher: true
  inline_edit: true       # toolbar Edit / press E; contenteditable
  save: file-system-access-api   # toolbar Save / Cmd-S, falls back to download
  pdf: { in_browser: true, headless: export-pdf.sh }   # one exact 1600x900 page per slide, fonts embedded
  standalone: build-standalone.py   # inlines fonts, capture lib, and images into one file
