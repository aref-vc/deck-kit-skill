# template-02 · Grid
# De Stijl / Mondrian variant of the deck backbone. Same backbone keys as template-01.
# Build pipeline reads this file to drive ingest -> outline -> theme -> assemble -> image -> pdf.

id: "02"
call: template-02
name: Grid
family: editorial-grid
status: built            # built | draft | planned
best_for:
  - design system
  - framework breakdown
  - modular product map
  - capabilities deck
reference_decks:         # working implementations in this repo
  - deck-kit/templates/02-grid/deck.html   # 12-slide, De Stijl bone palette, Space Grotesk/Inter

canvas:
  ratio: "16:9"
  stage: [1600, 900]     # px; all positions are absolute against this, then scaled to fit
  slides: [9, 14]        # typical range

mood:
  - editorial
  - structural
  - rigorous
  - contemporary

palette:
  # default theme. Others ship as body.theme-* classes the user can switch live.
  default: grid
  themes:
    grid:      { bg: "#F4F3EF", ink: "#1A1A1A", ink_2: "#555555", paper: "#FFFFFF",
                 red: "#D72A22", cyan: "#1E3A8C", yellow: "#F2C400", olive: "#1E3A8C", peach: "#D72A22" }
    newsroom:  { bg: "#ECECEC", ink: "#1E1E1E", ink_2: "#565656", paper: "#F6F4EE",
                 red: "#E5443B", cyan: "#34C5CE", yellow: "#ECC94B", olive: "#C2CE86", peach: "#F0AA8B" }
    riso:      { bg: "#F2EFE6", ink: "#1A1A2E", red: "#F8487F", cyan: "#3D5AFE", yellow: "#FFC400", olive: "#26C281", peach: "#FF8A65" }
    noir:      { bg: "#E9E7E2", ink: "#161616", red: "#E5403A", cyan: "#9AA0A6", yellow: "#C9C2B0", olive: "#B8BCAE", peach: "#CDC4BB" }
    botanic:   { bg: "#EDE9DF", ink: "#2B2A26", red: "#CE5B3C", cyan: "#5FA6B5", yellow: "#E0A52E", olive: "#7E8C4F", peach: "#E5A07C" }
  notes: >
    De Stijl primaries on a bone ground, bound by thick black rules. The five accent
    slots keep their names (red/cyan/yellow/olive/peach) but hold red, blue, yellow,
    blue, red so any slot reads on-brand. Black is structural, not an accent.

typography:
  source: google-fonts
  # vary the pairing per deck so two Grid decks do not read identically
  pairings:
    grotesk-inter:                       # deck.html (reference)
      heading: { family: Space Grotesk, weight: 700, case: upper }
      body:    { family: Inter, weight: 400 }
      label:   { family: Space Grotesk, weight: 600, case: upper }   # kickers, page numbers, footer, tags
  bundled: true            # woff2 localised under vendor/fonts so the PDF embeds them

imagery:
  medium: geometric        # collage | duotone-photo | painterly | geometric | charts | wireframe | ephemera
  strategy: authored       # no generated photos; visuals are inline SVG/CSS
  motifs:
    - Mondrian colour planes (red / blue / yellow)
    - thick black grid rules (8-14px)
    - rectangular cells of unequal size
    - stepped bar blocks and dot grids
    - flat primary-colour fills, no gradients
  rendering: [flat colour planes, hard black rules, no photography, no shadows]
  generate: none           # geometric; nothing to generate
  fallback: none           # visuals are authored in markup, no asset slots to miss

layout:
  signature:
    - rigid modular grid of unequal rectangular cells
    - thick black rules (8-14px) separating every block
    - primary-colour planes as accents, ink as structure
    - asymmetric, one idea per slide, generous whitespace in the type column
  blocks:                # the section vocabulary; pick and order per outline
    - cover
    - statement          # full-bleed opening line over a colour plane
    - index              # contents, ruled rows
    - about              # narrative + colour-plane composition
    - landscape          # two-column context (The Field)
    - pillars            # 5 cells in a row (How We Build)
    - services           # 3 cells (What We Make)
    - team               # 6-cell portrait grid (placeholders)
    - numbers            # stats + geometric bar block (placeholders)
    - roadmap            # 6 stepped cells, left to right
    - perspective        # pull quote over planes
    - closing            # contact

effects:
  texture: [faint film-grain overlay]
  shadows: none

rules:
  - geometry over illustration; no photos, no clip-art
  - flat primary fills only; black is structural, never decorative
  - every block sits inside or beside a thick black rule
  - keep copy plain: no em dashes, no filler, no jargon, no theatrics
  - one idea per slide; short declarative headlines
  - update the footer running title and NN/TT page numbers to match the final deck

features:                # shipped in the template, not content
  navigation: [arrows, space, home/end, on-screen buttons, "#n hash"]
  palette_switcher: true
  inline_edit: true       # toolbar Edit / press E; contenteditable
  save: file-system-access-api   # toolbar Save / Cmd-S, falls back to download
  pdf: { in_browser: true, headless: export-pdf.sh, standalone: build-standalone.py }
