# template-04 · Studio
# Creative-agency deck. Same backbone as template-01 (Newsroom); reskinned palette,
# fonts, imagery, and layout. Built by copying the deck-02 chrome and reskinning.

id: "04"
call: template-04
name: Studio
family: editorial-collage
status: built            # built | draft | planned
best_for:
  - agency pitch
  - creative portfolio
  - brand proposal
  - capabilities deck
reference_decks:         # working implementations in this repo
  - deck-kit/templates/04-studio/deck.html   # 12-slide, off-white + coral/lime/blue, Syne/Inter/Space Mono

canvas:
  ratio: "16:9"
  stage: [1600, 900]     # px; all positions are absolute against this, then scaled to fit
  slides: [9, 14]        # typical range

mood:
  - bold
  - graphic
  - editorial
  - confident

palette:
  # default theme. Others ship as body.theme-* classes the user can switch live.
  default: studio
  themes:
    # The five accent slots keep the names red/cyan/yellow/olive/peach but hold the
    # Studio accents: coral / electric-blue / acid-lime / cool-grey / coral.
    studio:    { bg: "#F5F4F2", ink: "#111111", ink_2: "#555555", paper: "#FFFFFF",
                 red: "#FF5A3C", cyan: "#1E6BFF", yellow: "#C8FF3D", olive: "#8A8F98", peach: "#FF5A3C" }
    newsroom:  { bg: "#ECECEC", ink: "#1E1E1E", ink_2: "#565656", paper: "#F6F4EE",
                 red: "#E5443B", cyan: "#34C5CE", yellow: "#ECC94B", olive: "#C2CE86", peach: "#F0AA8B" }
    riso:      { bg: "#F2EFE6", ink: "#1A1A2E", red: "#F8487F", cyan: "#3D5AFE", yellow: "#FFC400", olive: "#26C281", peach: "#FF8A65" }
    noir:      { bg: "#E9E7E2", ink: "#161616", red: "#E5403A", cyan: "#9AA0A6", yellow: "#C9C2B0", olive: "#B8BCAE", peach: "#CDC4BB" }
    botanic:   { bg: "#EDE9DF", ink: "#2B2A26", red: "#CE5B3C", cyan: "#5FA6B5", yellow: "#E0A52E", olive: "#7E8C4F", peach: "#E5A07C" }

typography:
  source: google-fonts        # bundled locally in vendor/fonts so the PDF embeds them
  # vary the pairing per deck so two Studio decks do not read identically
  pairings:
    syne-inter-mono:           # this deck
      heading: { family: Syne, weight: 800, case: upper }      # oversized, condensed-feel display
      body:    { family: Inter, weight: 400 }
      label:   { family: Space Mono, weight: 400, case: upper } # kickers, stickers, page numbers, footer

imagery:
  medium: duotone-photo         # bold, high-contrast, two-tone
  strategy: generate-all        # all 12+ heroes generated in palette
  motifs:
    - studio hands, clay, paper, print tools
    - abstract sculptural objects on plinths
    - portraits with hard rim light
    - oversized printed numbers and posters
  rendering: [bold duotone, posterized two-tone, heavy grain, near-black shadows + off-white highlights, single accent tint]
  generate: { tool: gemini-imagegen, post: "magick -level 0%,88%" }   # white-point to blend via multiply onto --bg
  fallback: css-svg             # every image sits in a .slot with a CSS/SVG placeholder if the asset is missing

layout:
  signature:
    - type-as-hero: oversized Syne 800 uppercase headlines and huge numbers
    - full-bleed duotone image moments off the right edge
    - sticker / label chips (mono, bordered, accent fills)
    - confident negative space, hard asymmetry
  blocks:                # the section vocabulary; pick and order per outline
    - cover
    - statement          # full-bleed opening line
    - index              # contents
    - about              # studio narrative + figure
    - landscape          # two-column context (The Field)
    - pillars            # 5 method steps in a row
    - services           # 3 cards (What We Make)
    - team               # portrait gallery (placeholders)
    - numbers            # stats / results (placeholders)
    - roadmap            # timeline, 6 milestones (The Plan)
    - perspective        # pull quote
    - closing            # contact

effects:
  texture: [film grain overlay, halftone dot field]
  shadows: minimal

rules:
  - bold duotone photography only; no corporate clip-art
  - one accent tint per image, baked onto --bg so the PDF needs no blend mode
  - type carries the page; let headlines and numbers run large
  - keep copy plain: no em dashes, no filler, no jargon, no theatrics
  - one idea per slide; short declarative headlines
  - update the footer running title and NN/TT page numbers to match the final deck

features:                # shipped in the template, not content
  navigation: [arrows, space, home/end, on-screen buttons, "#n hash"]
  palette_switcher: true
  inline_edit: true       # toolbar Edit / press E; contenteditable, commitEdits flush
  save: file-system-access-api   # toolbar Save / Cmd-S, falls back to download
  pdf: { in_browser: true, headless: export-pdf.sh }   # one exact 1600x900 page per slide, fonts embedded
  standalone: build-standalone.py   # inlines fonts, capture lib, and images into one file
