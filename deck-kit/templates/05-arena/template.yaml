# template-05 · Arena
# Sports / club partnership deck. Dark stadium palette, kinetic athletic duotone.
# Same backbone as template-01-newsroom.yaml; the build pipeline reads these keys.

id: "05"
call: template-05
name: Arena
family: editorial-collage
status: built            # built | draft | planned
best_for:
  - sponsorship deck
  - club partnership pitch
  - sports business
  - season / performance review
reference_decks:         # working implementations in this repo
  - deck-02/deck.html                                  # 12-slide parent this was reskinned from
  - deck-kit/templates/05-arena/deck.html              # this template

canvas:
  ratio: "16:9"
  stage: [1600, 900]     # px; all positions are absolute against this, then scaled to fit
  slides: [9, 14]        # typical range

mood:
  - dark
  - kinetic
  - high-contrast
  - energetic

palette:
  # default theme. Others ship as body.theme-* classes the user can switch live.
  default: arena
  themes:
    arena:     { bg: "#0E0E0E", ink: "#FFFFFF", ink_2: "#B5B5B5", paper: "#161616",
                 red: "#E2231A", cyan: "#1E6BFF", yellow: "#E8FF00", olive: "#10B981", peach: "#FF7A00" }
    newsroom:  { bg: "#ECECEC", ink: "#1E1E1E", ink_2: "#565656", paper: "#F6F4EE",
                 red: "#E5443B", cyan: "#34C5CE", yellow: "#ECC94B", olive: "#C2CE86", peach: "#F0AA8B" }
    riso:      { bg: "#F2EFE6", ink: "#1A1A2E", red: "#F8487F", cyan: "#3D5AFE", yellow: "#FFC400", olive: "#26C281", peach: "#FF8A65" }
    noir:      { bg: "#E9E7E2", ink: "#161616", red: "#E5403A", cyan: "#9AA0A6", yellow: "#C9C2B0", olive: "#B8BCAE", peach: "#CDC4BB" }
    botanic:   { bg: "#EDE9DF", ink: "#2B2A26", red: "#CE5B3C", cyan: "#5FA6B5", yellow: "#E0A52E", olive: "#7E8C4F", peach: "#E5A07C" }
  # accent-slot mapping (names kept, hexes are Arena's): red=red, cyan=blue, yellow=electric yellow, olive=green, peach=orange

typography:
  source: google-fonts
  # bundled locally in vendor/fonts so the PDF embeds them. Vary the pairing per deck.
  pairings:
    saira-inter:                         # this template
      heading: { family: Saira Condensed, weight: 800, case: upper, style: italic }   # italic synthesized (no native italic axis)
      body:    { family: Inter, weight: 400 }
      figures: { family: Saira Condensed, weight: 800, numeric: tabular }
      label:   { family: Saira Condensed, weight: 600, case: upper }   # eyebrows, kickers, footer, page numbers

imagery:
  medium: duotone-photo  # motion-blur athletic duotone, generated via Gemini on dark #0E0E0E
  strategy: generate     # all 14 slide images generated and baked onto --bg
  motifs:
    - footballers in motion with long-exposure speed streaks
    - sprint, strike, header, tackle, celebration
    - floodlit stadium stands and packed terraces
    - touchline coach in rim light
  rendering: [high-contrast duotone, motion blur, grain, electric-yellow + accent rim light on near-black]
  generate: { tool: gemini-imagegen, post: "magick -level 0%,88%" }   # bake onto #0E0E0E via multiply, no blend mode needed
  fallback: css-svg      # every image sits in a .slot with a CSS/SVG placeholder if the asset is missing

layout:
  signature:
    - dark high-contrast stage
    - dynamic diagonal slashes (skewed accent bars)
    - oversized jersey-numeral figures behind copy
    - scoreboard ticker strip on the cover
    - energetic asymmetry, full-bleed photo edges
  blocks:                # the section vocabulary; pick and order per outline
    - cover              # ticker strip + diagonal slash
    - statement          # full-bleed opening line
    - index              # "Line-up" contents
    - about              # "The Club" narrative + figure + giant jersey numeral
    - landscape          # "The Market" two-column context
    - pillars            # "How We Play" 5 elements in a row
    - services           # "What You Get" 3 cards
    - team               # "The Squad" portrait row (placeholders)
    - numbers            # "The Numbers" stats (placeholders)
    - roadmap            # "The Season Plan" timeline, 6 milestones
    - perspective        # "From the Dugout" pull quote
    - closing            # contact

effects:
  texture: [film grain overlay, motion blur, deep shadow]
  shadows: minimal

rules:
  - dark stadium palette; electric yellow is the lead accent
  - motion-blur athletic duotone photography, no corporate stock
  - diagonal slashes and oversized jersey numerals carry the energy
  - keep copy plain: no em dashes, no filler, no jargon, no theatrics
  - one idea per slide; short declarative headlines
  - update the footer running title and NN/TT page numbers to match the final deck

features:                # shipped in the template, not content
  navigation: [arrows, space, home/end, on-screen buttons, "#n hash"]
  palette_switcher: true
  inline_edit: true       # toolbar Edit / press E; contenteditable
  save: file-system-access-api   # toolbar Save / Cmd-S, falls back to download
  pdf: { in_browser: true, print_css: true, headless: export-pdf.sh }   # one exact 1600x900 page per slide
