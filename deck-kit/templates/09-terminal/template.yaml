# template-09 · Terminal
# Coding / IT vintage. Greenbar printer paper, monospace, ASCII frames, schematic SVG.
# Built by reskinning the deck-02 backbone. Fills the same keys as template-01-newsroom.yaml.

id: "09"
call: template-09
name: Terminal
family: editorial-collage
status: built            # built | draft | planned
best_for:
  - repo summary
  - architecture overview
  - AI / agent system dossier
  - technical capabilities deck
reference_decks:
  - deck-kit/templates/09-terminal/deck.html   # 12-slide, greenbar palette, JetBrains Mono / Space Mono

canvas:
  ratio: "16:9"
  stage: [1600, 900]     # px; all positions are absolute against this, then scaled to fit
  slides: [9, 14]        # typical range

mood:
  - technical
  - vintage-computing
  - schematic
  - precise

palette:
  # default theme. Others ship as body.theme-* classes the user can switch live.
  default: terminal
  themes:
    terminal:  { bg: "#E8E6D9", ink: "#14160F", ink_2: "#4A4D40", paper: "#F2F1E6",
                 red: "#2E7D32", cyan: "#1F4E8C", yellow: "#C77B16", olive: "#4A6B2E", peach: "#7A9A4E" }
    newsroom:  { bg: "#ECECEC", ink: "#1E1E1E", ink_2: "#565656", paper: "#F6F4EE",
                 red: "#E5443B", cyan: "#34C5CE", yellow: "#ECC94B", olive: "#C2CE86", peach: "#F0AA8B" }
    riso:      { bg: "#F2EFE6", ink: "#1A1A2E", red: "#F8487F", cyan: "#3D5AFE", yellow: "#FFC400", olive: "#26C281", peach: "#FF8A65" }
    noir:      { bg: "#E9E7E2", ink: "#161616", red: "#E5403A", cyan: "#9AA0A6", yellow: "#C9C2B0", olive: "#B8BCAE", peach: "#CDC4BB" }
    botanic:   { bg: "#EDE9DF", ink: "#2B2A26", red: "#CE5B3C", cyan: "#5FA6B5", yellow: "#E0A52E", olive: "#7E8C4F", peach: "#E5A07C" }
  # accent slots keep deck-02 names but hold terminal hexes:
  # red = CRT green, cyan = IBM blue, yellow = amber, olive/peach = green tints

typography:
  source: google-fonts   # bundled locally in vendor/fonts so the PDF embeds them
  pairings:
    jetbrains-spacemono:                 # this deck (monospace everywhere)
      heading: { family: JetBrains Mono, weight: 700, case: title }
      body:    { family: JetBrains Mono, weight: 400 }
      label:   { family: Space Mono, weight: 400, case: upper }   # kickers, comments, page numbers, footer

imagery:
  medium: schematic       # inline SVG/CSS + ASCII frames, no generated photos
  strategy: authored      # every visual is hand-authored inline SVG in the slide markup
  motifs:
    - rack units and status LEDs
    - circuit traces and node graphs
    - directory trees and terminal windows
    - layered system stacks
    - bar charts and gantt windows
    - punch-card hole grids
  rendering: [monospace line-art, ASCII boxed frames, ledger stripes, CRT scanline grain]
  generate: none          # schematic medium: no Gemini, no jpg assets
  fallback: inline-svg     # visuals live in .slot blocks; no external files to miss

layout:
  signature:
    - greenbar ledger stripes behind every slide
    - boxed ASCII frames with corner ticks
    - monospace grids and code-comment annotations
    - terminal prompts and circuit-trace motifs
    - strong asymmetry, one idea per slide
  blocks:
    - cover
    - statement
    - index
    - about
    - landscape
    - pillars            # 5-stage pipeline
    - services           # 3 product cards
    - team               # id-card gallery (placeholders)
    - numbers            # stats + bar chart (placeholders)
    - roadmap            # commit-log timeline + gantt
    - perspective        # pull quote in a terminal window
    - closing            # contact / open a session

effects:
  texture: [greenbar ledger stripes, CRT scanline, paper grain overlay]
  shadows: none

rules:
  - schematic SVG over photography; no clip-art, no generated images
  - monospace everywhere; boxed ASCII frames and ledger lines
  - accent colours are CRT green, IBM blue, amber on greenbar paper
  - keep copy plain: no em dashes, no filler, no jargon, no theatrics
  - one idea per slide; short declarative headlines
  - update the footer running title and NN/TT page numbers to match the final deck

features:                # shipped in the template, not content
  navigation: [arrows, space, home/end, on-screen buttons, "#n hash"]
  palette_switcher: true
  inline_edit: true       # toolbar Edit / press E; contenteditable
  save: file-system-access-api   # toolbar Save / Cmd-S, falls back to download
  pdf: { in_browser: true, headless: export-pdf.sh }   # one exact 1600x900 page per slide
