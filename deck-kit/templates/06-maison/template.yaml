# template-06 · Maison
# Luxury house deck. Restraint, air, hairline gold rules, large quiet photography.
# Fills the same backbone as template-01-newsroom.yaml.

id: "06"
call: template-06
name: Maison
family: editorial-collage
status: built            # built | draft | planned
best_for:
  - investor review
  - board deck
  - premium brand
  - hospitality
reference_decks:         # working implementations in this repo
  - deck-kit/templates/06-maison/deck.html   # 12-slide, oat + gold/burgundy, Bodoni Moda/Jost

canvas:
  ratio: "16:9"
  stage: [1600, 900]     # px; all positions absolute against this, then scaled to fit
  slides: [12, 12]

mood:
  - restrained
  - elegant
  - quiet
  - editorial

palette:
  # default theme. Others ship as body.theme-* classes the user can switch live.
  default: maison
  themes:
    maison:    { bg: "#F1ECE3", ink: "#1B1A18", ink_2: "#6E665C", paper: "#FAF6EE",
                 red: "#B08D4C", cyan: "#6E2433", yellow: "#C7A86A", olive: "#8A7B5E", peach: "#D8C4A0" }
    newsroom:  { bg: "#ECECEC", ink: "#1E1E1E", ink_2: "#565656", paper: "#F6F4EE",
                 red: "#E5443B", cyan: "#34C5CE", yellow: "#ECC94B", olive: "#C2CE86", peach: "#F0AA8B" }
    riso:      { bg: "#F2EFE6", ink: "#1A1A2E", red: "#F8487F", cyan: "#3D5AFE", yellow: "#FFC400", olive: "#26C281", peach: "#FF8A65" }
    noir:      { bg: "#E9E7E2", ink: "#161616", red: "#E5403A", cyan: "#9AA0A6", yellow: "#C9C2B0", olive: "#B8BCAE", peach: "#CDC4BB" }
    botanic:   { bg: "#EDE9DF", ink: "#2B2A26", red: "#CE5B3C", cyan: "#5FA6B5", yellow: "#E0A52E", olive: "#7E8C4F", peach: "#E5A07C" }
  notes: >
    Gold (#B08D4C) and burgundy (#6E2433) are jewel accents used sparingly against
    large fields of oat paper. The five accent slots keep the names red/cyan/yellow/olive/peach.

typography:
  source: google-fonts
  bundled: true           # woff2 localized in vendor/fonts so the PDF embeds them
  # vary the pairing per deck so two Maison decks do not read identically
  pairings:
    bodoni-jost:                         # deck.html (this build)
      heading: { family: Bodoni Moda, weight: 600, case: title, note: high-contrast Didone }
      body:    { family: Jost, weight: "300/400" }
      label:   { family: Jost, weight: 500, case: upper, tracking: wide }   # eyebrows, kickers, footer, page numbers

imagery:
  medium: minimal-photo   # large, quietly-toned monochrome editorial photography
  strategy: generate-all  # all 12 heroes generated in palette
  motifs:
    - single luxury object on linen or stone (leather, glass, cloth)
    - artisan hands at the workbench
    - quiet maison facade and interior
    - far-apart still lifes with vast negative space
  rendering: [monochrome, warm oat tone, soft raking light, deep quiet shadow, fine film grain]
  generate: { tool: gemini-imagegen, post: 'magick -level 0%,88% multiply onto --bg' }  # bake so PDF needs no blend mode
  fallback: css-svg       # every image sits in a .slot with a CSS/SVG placeholder if missing
  aspect_ratios:
    cover/about/index-strip/quote/closing: "3:4"
    landscape: "4:3"
    pillars-row/team-row/roadmap-row: "21:9"
    card-1/card-2/card-3/results: "1:1"

layout:
  signature:
    - huge negative space
    - hairline gold rules (1px)
    - large quietly-toned photography, often full-height bleed
    - rigorous left-margin alignment, sparse
    - one idea per slide
  blocks:                 # the 12 sections, in order
    - cover
    - statement           # full-bleed opening line, no image
    - index               # contents
    - about               # the house, narrative + figure
    - market              # two-column context
    - pillars             # how we make, 5 elements in a row
    - collections         # 3 cards
    - atelier             # team gallery (placeholders)
    - numbers             # stats / results (placeholders)
    - roadmap             # the plan, 6 milestones
    - perspective         # pull quote
    - closing             # contact

effects:
  texture: [film grain overlay at low opacity]
  shadows: minimal

rules:
  - restraint over decoration; large fields of empty oat paper
  - hairline gold rules, never heavy bars
  - large quiet monochrome photography; jewel accents used sparingly
  - keep copy plain: no em dashes, no filler, no jargon, no theatrics
  - one idea per slide; short declarative headlines
  - keep clear placeholders for stats, team names/roles, and contact
  - update the footer running title and NN/12 page numbers to match the final deck

features:                 # shipped in the template, not content
  navigation: [arrows, space, home/end, on-screen buttons, "#n hash"]
  palette_switcher: true
  inline_edit: true       # toolbar Edit / press E; contenteditable
  save: file-system-access-api   # toolbar Save / Cmd-S, falls back to download
  pdf: { in_browser: true, lib: vendor/html-to-image.js }   # one exact 1600x900 page per slide, fonts+images baked in
  standalone: build-standalone.py   # single self-contained deck-standalone.html, 0 external refs
